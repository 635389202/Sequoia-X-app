name: Publish Daily App Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional trading date, for example 2026-07-06"
        required: false
        type: string
  schedule:
    - cron: '10 10 * * 1-5'

permissions:
  contents: write

concurrency:
  group: publish-daily-app-data
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: https://example.invalid/skip-notify
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PUBLISH_DATE: ${{ inputs.date }}
      PYTHONUTF8: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Publish app data release
        run: |
          if [ -n "$PUBLISH_DATE" ]; then
            python publish_daily_release.py --repository "$GITHUB_REPOSITORY" --date "$PUBLISH_DATE"
          else
            python publish_daily_release.py --repository "$GITHUB_REPOSITORY"
          fi
